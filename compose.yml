name: Run Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose -f compose.yml up --build -d

      - name: Wait for app to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:5000/health && break
            echo "Waiting for app..."
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest -r app/requirements.txt

      - name: Run tests
        run: pytest test.py

      - name: Show logs on failure
        if: failure()
        run: docker compose -f compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f compose.yml down -v
