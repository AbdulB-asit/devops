name: Run Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug - list files
        run: |
          pwd
          ls -la
          find . -name "requirements.txt"

      - name: Install dependencies
        run: pip install pytest -r compose-lab/app/requirements.txt

      - name: Run tests
        run: pytest tests/test.py
